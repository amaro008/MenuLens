<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MenuLens — Dashboard</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-title" id="loadingTitle">Cargando…</div>
    <div class="loading-step"  id="loadingStep"></div>
  </div>
  <div id="toast"></div>
  <div class="topbar" id="topbar"></div>
  <div class="topbar-accent"></div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content">
      <div class="scrollable">
        <div class="content">
          <div class="page-header">
            <div>
              <div class="page-title" id="welcomeMsg">Bienvenido 👋</div>
              <div class="page-sub">Resumen de tu actividad</div>
            </div>
            <a href="analyzer.html" class="btn btn-primary">+ Nuevo análisis</a>
          </div>

          <div class="stats-grid">
            <div class="stat-card"><div class="stat-num" id="st1">—</div><div class="stat-label">Análisis este mes</div></div>
            <div class="stat-card"><div class="stat-num" id="st2">—</div><div class="stat-label">Restaurantes</div></div>
            <div class="stat-card"><div class="stat-num" id="st3">—</div><div class="stat-label">SKUs recomendados</div></div>
            <div class="stat-card"><div class="stat-num" id="st4" style="font-size:16px;padding-top:4px">—</div><div class="stat-label">Tipo más analizado</div></div>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="card-header">
                <div class="card-title">⚡ Acceso rápido</div>
              </div>
              <div style="display:flex;gap:10px;flex-wrap:wrap">
                <a href="analyzer.html" class="btn btn-primary">+ Nuevo análisis</a>
                <a href="history.html"  class="btn btn-outline">Ver historial</a>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="card-header">
                <div class="card-title">📋 Últimos análisis</div>
                <a href="history.html" class="btn btn-outline btn-sm">Ver todos</a>
              </div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr><th>Restaurante</th><th>Tipo</th><th>Fecha</th><th>SKUs</th><th>Estado</th><th></th></tr>
                  </thead>
                  <tbody id="recentTable">
                    <tr><td colspan="6" style="text-align:center;color:var(--text-l);padding:24px">Sin análisis aún</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;
  renderTopbar(user, false);
  renderSidebar(currentPage, user.role);
  document.getElementById('welcomeMsg').textContent = `Bienvenido, ${user.name.split(' ')[0]} 👋`;
  await loadDashboard(user);
})();

async function loadDashboard(user) {
  const sb = getSupabase();
  if (!sb) {
    document.getElementById('st1').textContent = '5';
    document.getElementById('st2').textContent = '4';
    document.getElementById('st3').textContent = '48';
    document.getElementById('st4').textContent = 'Mexicana';
    document.getElementById('recentTable').innerHTML = `
      <tr>
        <td><div class="td-main">La Trattoria del Centro</div><div class="td-sub">Roma Norte, CDMX</div></td>
        <td><span class="badge badge-yellow">Italiana</span></td>
        <td>Hoy</td><td>14</td>
        <td><span class="badge badge-green">Completo</span></td>
        <td><a href="results.html" class="btn btn-outline btn-xs">Ver</a></td>
      </tr>`;
    return;
  }

  const since = new Date();
  since.setDate(1);

  const { data } = await sb.from('analyses')
    .select('id, created_at, status, sku_count, restaurants(name, city, food_type)')
    .eq('user_id', user.id)
    .gte('created_at', since.toISOString())
    .order('created_at', { ascending: false })
    .limit(10);

  if (!data) return;
  document.getElementById('st1').textContent = data.length;
  document.getElementById('st2').textContent = new Set(data.map(a => a.restaurant_id)).size;
  document.getElementById('st3').textContent = data.reduce((s, a) => s + (a.sku_count || 0), 0);

  const types = data.map(a => a.restaurants?.food_type).filter(Boolean);
  const top = types.sort((a, b) => types.filter(x => x === b).length - types.filter(x => x === a).length)[0];
  document.getElementById('st4').textContent = top || '—';

  const rows = data.slice(0, 5).map(a => `
    <tr>
      <td><div class="td-main">${a.restaurants?.name || '—'}</div><div class="td-sub">${a.restaurants?.city || ''}</div></td>
      <td><span class="badge badge-yellow">${a.restaurants?.food_type || '—'}</span></td>
      <td>${formatDate(a.created_at)}</td>
      <td>${a.sku_count || '—'}</td>
      <td><span class="badge ${a.status === 'complete' ? 'badge-green' : 'badge-yellow'}">${a.status === 'complete' ? 'Completo' : 'En proceso'}</span></td>
      <td><a href="results.html?id=${a.id}" class="btn btn-outline btn-xs">Ver</a></td>
    </tr>`).join('');

  document.getElementById('recentTable').innerHTML = rows ||
    `<tr><td colspan="6" style="text-align:center;color:var(--text-l);padding:24px">Sin análisis este mes</td></tr>`;
}
</script>
</body>
</html>
