<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MenuLens — Usuarios</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-title" id="loadingTitle">Procesando…</div>
    <div class="loading-step"  id="loadingStep"></div>
  </div>
  <div id="toast"></div>

  <!-- Modal: add/edit user -->
  <div class="modal-overlay" id="modalUser">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Agregar usuario</div>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('modalUser')">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="form-group">
            <label class="form-label">Nombre completo</label>
            <input class="form-input" id="uName" placeholder="Ej: Carlos Vega">
          </div>
          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input class="form-input" id="uEmail" type="email" placeholder="carlos@empresa.com">
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña temporal</label>
            <input class="form-input" id="uPassword" type="password" placeholder="Mín. 8 caracteres">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Rol</label>
              <select class="form-input" id="uRole">
                <option value="advisor">Asesor</option>
                <option value="supervisor">Supervisor</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Código de asesor</label>
              <input class="form-input" id="uAdvisorCode" placeholder="Ej: ASE-001">
            </div>
            <div class="form-group">
              <label class="form-label">Sucursal / Oficina</label>
              <select class="form-input" id="uOffice">
                <option value="">Sin sucursal asignada</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modalUser')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveUser()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="topbar" id="topbar"></div>
  <div class="topbar-accent"></div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content">
      <div class="scrollable">
        <div class="content">
          <div class="page-header">
            <div>
              <div class="page-title">Usuarios</div>
              <div class="page-sub">Alta, baja y permisos</div>
            </div>
            <button class="btn btn-primary" onclick="openUserModal()">+ Agregar usuario</button>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="card-header">
                <div class="card-title">👥 Usuarios registrados</div>
                <span class="badge badge-red" id="userCount">0 usuarios</span>
              </div>
              <div id="userList"></div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="card-header">
                <div class="card-title">🔐 Permisos por rol — Asesor</div>
                <button class="btn btn-primary btn-sm" onclick="savePerms()">Guardar cambios</button>
              </div>
              <div class="permission-row">
                <div><div class="perm-label">Subir menús y analizar</div></div>
                <button class="toggle on" id="pUpload" onclick="this.classList.toggle('on')"></button>
              </div>
              <div class="permission-row">
                <div><div class="perm-label">Ver historial propio</div></div>
                <button class="toggle on" id="pHistOwn" onclick="this.classList.toggle('on')"></button>
              </div>
              <div class="permission-row">
                <div><div class="perm-label">Ver historial de todos</div></div>
                <button class="toggle" id="pHistAll" onclick="this.classList.toggle('on')"></button>
              </div>
              <div class="permission-row">
                <div><div class="perm-label">Exportar Excel de resultados</div></div>
                <button class="toggle on" id="pExport" onclick="this.classList.toggle('on')"></button>
              </div>
              <div class="permission-row">
                <div><div class="perm-label">Compartir por WhatsApp</div></div>
                <button class="toggle on" id="pShare" onclick="this.classList.toggle('on')"></button>
              </div>
              <div class="permission-row">
                <div><div class="perm-label">Acceso al panel de administración</div></div>
                <button class="toggle" id="pAdmin" onclick="this.classList.toggle('on')"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
(async () => {
  const user = await requireAuth('admin_or_supervisor');
  if (!user) return;
  renderTopbar(user, true);
  renderSidebar(currentPage, user.role);
  loadUsers();
})();

async function loadUsers() {
  const sb = getSupabase();
  if (!sb) {
    renderUsers([
      { id:'1', name:'Carlos Vega',     email:'carlos@sigma.com',  role:'advisor' },
      { id:'2', name:'María Rodríguez', email:'m.rod@sigma.com',   role:'advisor' },
      { id:'3', name:'Jorge Pérez',     email:'j.perez@sigma.com', role:'supervisor' },
      { id:'4', name:'Administrador',   email:'admin@sigma.com',   role:'admin' },
    ]);
    return;
  }
  const { data } = await sb.from('users').select('*').order('created_at');
  renderUsers(data || []);
}

function renderUsers(list) {
  document.getElementById('userCount').textContent = list.length + ' usuarios';
  const roleMap = { admin:'badge-red', supervisor:'badge-green', advisor:'badge-yellow' };
  const roleLabel = { admin:'Admin', supervisor:'Supervisor', advisor:'Asesor' };
  document.getElementById('userList').innerHTML = list.map(u => `
    <div style="display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #F9FAFB">
      <div class="avatar-md">${initials(u.name)}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${u.name}</div>
        <div style="font-size:11px;color:var(--text-m)">${u.email}</div>
      </div>
      <span class="badge ${roleMap[u.role]||'badge-gray'}">${roleLabel[u.role]||u.role}</span>
      <button class="btn btn-ghost btn-xs" onclick="editUser('${u.id}','${u.name}','${u.email}','${u.role}','${u.advisor_code||''}','${u.office_id||''}')">Editar</button>
    </div>`).join('') || '<div style="color:var(--text-l);font-size:13px;padding:12px 0">Sin usuarios</div>';
}

async function loadOfficesIntoSelect(selectId) {
  try {
    const sb = await getSupabaseAsync();
    if (!sb) return;
    const { data } = await sb.from('offices').select('id,name,code').eq('active',true).order('name');
    const sel = document.getElementById(selectId);
    if (!sel || !data) return;
    sel.innerHTML = '<option value="">Sin sucursal asignada</option>' +
      data.map(o => `<option value="${o.id}">${o.name} (${o.code})</option>`).join('');
  } catch(e) { console.warn('loadOffices:', e); }
}

function openUserModal() {
  _editingUserId = null;
  document.getElementById('modalTitle').textContent = 'Agregar usuario';
  document.getElementById('uName').value = '';
  document.getElementById('uEmail').value = '';
  document.getElementById('uPassword').value = '';
  document.getElementById('uRole').value = 'advisor';
  if (document.getElementById('uAdvisorCode')) document.getElementById('uAdvisorCode').value = '';
  openModal('modalUser');
  loadOfficesIntoSelect('uOffice');
}

let _editingUserId = null;

function editUser(id, name, email, role, advisorCode, officeId) {
  _editingUserId = id;
  document.getElementById('modalTitle').textContent = 'Editar usuario';
  document.getElementById('uName').value = name || '';
  document.getElementById('uEmail').value = email || '';
  document.getElementById('uPassword').value = '';
  document.getElementById('uRole').value = role || 'advisor';
  document.getElementById('uAdvisorCode').value = advisorCode || '';
  openModal('modalUser');
  loadOfficesIntoSelect('uOffice').then(() => {
    if (officeId) document.getElementById('uOffice').value = officeId;
  });
}

async function saveUser() {
  const name  = document.getElementById('uName').value.trim();
  const email = document.getElementById('uEmail').value.trim();
  const pwd   = document.getElementById('uPassword').value;
  const role  = document.getElementById('uRole').value;
  if (!name || !email) { toast('Nombre y correo son requeridos', 'error'); return; }

  // Password only required for new users
  if (!_editingUserId && (!pwd || pwd.length < 8)) {
    toast('La contraseña debe tener mínimo 8 caracteres', 'error'); return;
  }

  const advisorCode = document.getElementById('uAdvisorCode')?.value.trim() || '';
  const officeId    = document.getElementById('uOffice')?.value || null;

  const sb = await getSupabaseAsync();
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.access_token) {
    toast('Sesión expirada. Vuelve a iniciar sesión.', 'error'); return;
  }

  if (_editingUserId) {
    // ── UPDATE existing user ──
    showLoading('Actualizando usuario…', '');
    try {
      // Update profile in public.users
      const { error } = await sb.from('users').update({
        name, role,
        advisor_code: advisorCode || null,
        office_id:    officeId || null
      }).eq('id', _editingUserId);

      if (error) throw new Error(error.message);

      // Update password if provided
      if (pwd && pwd.length >= 8) {
        await fetch('/api/create-user', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
          body: JSON.stringify({ user_id: _editingUserId, password: pwd })
        });
      }

      hideLoading();
      closeModal('modalUser');
      toast('✅ Usuario actualizado', 'success');
      loadUsers();
    } catch(e) {
      hideLoading();
      toast('Error: ' + e.message, 'error');
    }
    return;
  }

  // ── CREATE new user ──
  showLoading('Creando usuario…', '');
  try {
    const resp = await fetch('/api/create-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ email, password: pwd, name, role, advisor_code: advisorCode, office_id: officeId })
    });

    const result = await resp.json();
    if (!resp.ok) {
      hideLoading();
      toast('Error: ' + (result.error || resp.status), 'error');
      return;
    }

    hideLoading();
    closeModal('modalUser');
    toast('✅ Usuario ' + name + ' creado', 'success');
    loadUsers();

  } catch(e) {
    hideLoading();
    toast('Error: ' + e.message, 'error');
  }
}

function savePerms() { toast('✅ Permisos guardados', 'success'); }
</script>
</body>
</html>
